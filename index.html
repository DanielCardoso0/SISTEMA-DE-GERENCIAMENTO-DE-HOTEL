<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Hoteleira — Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="soft-background">
        <div class="floating-shapes">
            <div class="soft-blob blob-1"></div>
            <div class="soft-blob blob-2"></div>
            <div class="soft-blob blob-3"></div>
            <div class="soft-blob blob-4"></div>
        </div>
    </div>

    <div class="login-container">
        <div class="soft-card">
            <div class="comfort-header">
                <div class="gentle-logo">
                    <div class="logo-circle">
                        <div class="comfort-icon">
                            <!-- Ícone Original do Hotel -->
                            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M3 21h18M3 7l9-4 9 4M4 21V7M20 21V7M9 21v-4h6v4"/>
                            </svg>
                        </div>
                        <div class="gentle-glow"></div>
                    </div>
                </div>
                <h1 class="comfort-title">Bem‑vindo de volta</h1>
                <p class="gentle-subtitle">Gestão Hoteleira Inteligente</p>
            </div>
            
            <form class="comfort-form" id="loginForm" novalidate onsubmit="event.preventDefault(); doLogin();">
                <div class="soft-field">
                    <div class="field-container" id="containerUsuario">
                        <!-- O placeholder=" " é necessário para o CSS do floating label funcionar -->
                        <input type="text" id="usuario" name="usuario" required autocomplete="username" placeholder=" ">
                        <label for="usuario">Utilizador</label>
                        <div class="field-accent"></div>
                    </div>
                    <span class="gentle-error" id="uError"></span>
                </div>

                <div class="soft-field">
                    <div class="field-container" id="containerSenha">
                        <input type="password" id="senha" name="senha" required autocomplete="current-password" placeholder=" ">
                        <label for="senha">Senha</label>
                        <button type="button" class="gentle-toggle" id="passwordToggle" onclick="togglePw(this)" aria-label="Mostrar senha">
                            <div class="toggle-icon">
                                <svg class="eye-open" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M10 3c-4.5 0-8.3 3.8-9 7 .7 3.2 4.5 7 9 7s8.3-3.8 9-7c-.7-3.2-4.5-7-9-7z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                    <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                </svg>
                                <svg class="eye-closed" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M3 3l14 14M8.5 8.5a3 3 0 004 4m2.5-2.5C15 10 12.5 7 10 7c-.5 0-1 .1-1.5.3M10 13c-2.5 0-4.5-2-5-3 .3-.6.7-1.2 1.2-1.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </button>
                        <div class="field-accent"></div>
                    </div>
                    <span class="gentle-error" id="sError"></span>
                </div>

                <div class="comfort-options">
                    <label class="gentle-checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-soft">
                            <div class="check-circle"></div>
                            <svg class="check-mark" width="12" height="10" viewBox="0 0 12 10" fill="none">
                                <path d="M1 5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span class="checkbox-text">Lembrar-me</span>
                    </label>
                </div>

                <button type="submit" class="comfort-button" id="btnLogin">
                    <div class="button-background"></div>
                    <span class="button-text">Entrar no Sistema</span>
                    <div class="button-loader">
                        <div class="gentle-spinner">
                            <div class="spinner-circle"></div>
                        </div>
                    </div>
                    <div class="button-glow"></div>
                </button>
            </form>

            <div class="comfort-signup">
                <span class="signup-text">Credenciais de acesso:</span>
                <span class="comfort-link" style="cursor:default;">admin / 2026</span>
            </div>

            <!-- Ecrã de Sucesso (Oculto por defeito) -->
            <div class="gentle-success" id="successMessage">
                <div class="success-bloom">
                    <div class="bloom-rings">
                        <div class="bloom-ring ring-1"></div>
                        <div class="bloom-ring ring-2"></div>
                    </div>
                    <div class="success-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M8 14l5 5 11-11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
                <h3 class="success-title">Bem-vindo!</h3>
                <p class="success-desc">A redirecionar para o painel...</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
